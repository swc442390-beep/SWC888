<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Players Management - Pitwarriors619</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="dashboard-body">

    <!-- SIDEBAR (COPY SAME SIDEBAR HERE) -->
    <div class="sidebar" id="sidebar">
        <h2>Welcome, <span class="username">Agent</span></h2>

        <a href="admin.html">🏠 Dashboard</a>
        <a href="summary.html" id="summaryLink">📊 Summary Report</a>
        <a href="wallet-logs.html">📄 Wallet Logs</a>
        <a href="commission-logs.html">💰 Commission Logs</a>
        <a href="withdrawal.html">💸 Commission Withdrawals 
            <span id="withdrawBadge" class="badge blue" style="display:none;">0</span>
        </a>
        <!--<a href="archives.html">🗂 Archives</a>-->

        <div class="category">Downlines</div>
        <a href="agents.html">👥 Agents</a>
        <a href="players.html">🧑 Players</a>
        <a href="pending.html">⏳ Pending Approvals 
            <span id="pendingBadge" class="badge red" style="display:none;">0</span>
        </a>

        <div class="category">Settings</div>
        <!--<a href="account.html">👥 Account Management</a>-->
        <a href="change-password.html">🔑 Change Password</a>
        <a href="/api/logout">🚪 Logout</a>
    </div>

    <!-- MAIN -->
    <div class="main">

        <div class="header">
            <div class="hamburger" onclick="toggleSidebar()">☰</div>
        </div>

        <div class="content">
            <h2>Players</h2>

            <div class="membership-card">

                <!-- FILTER -->
                <div class="filter-bar">
                    <!--<select id="statusFilter" class="styled-select" onchange="loadPlayers()">-->
                    <select id="statusFilter" class="membership-link" onchange="loadPlayers()">
                        <option value="">All Status</option>
                        <option value="online">🟢 Active</option>
                        <option value="offline">⚪ Offline</option>
                        <option value="suspended">🔴 Suspended</option>
                    </select>
                </div>

                <!-- TABLE -->
                <div class="table-wrapper">
                    <table class="styled-table">
                        <thead>
                            <tr>
                                <th>Username</th>
                                <th>Points</th>
                                <th>Agent</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="playersTable"></tbody>
                    </table>
                </div>
            </div>
            <div id="snackbar"></div>
        </div>
        <!-- MODAL -->
        <div id="pointsModal" class="modal">
            <div class="modal-content">
                <h3>Add Points</h3>
                <input type="number" id="pointsInput" placeholder="Enter points">
                <button onclick="confirmAddPoints()">✅ Confirm</button>
                <button onclick="closeModal()">❌ Cancel</button>
            </div>
        </div>
        <footer>
            © 2024 Pitwarriors619. All rights reserved.
        </footer>

    </div>

    <script>
        function formatNumber(amount) {
            return new Intl.NumberFormat('en-PH', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            }).format(amount);
        }
        async function checkSession() {
            try {
                const res = await fetch('/api/dashboard', {
                    credentials: 'include'
                });

                if (res.status === 401) {
                    window.location.href = '/';
                    return;
                }

                const data = await res.json();
                if (data.role !== 'admin') {
                    const summaryLink = document.getElementById('summaryLink');
                    if (summaryLink) summaryLink.style.display = 'none';
                }
                document.querySelectorAll('.username')
                    .forEach(el => el.textContent = data.username);
                // ✅ LOAD PLAYERS HERE
                loadPlayers();
            } catch (err) {
                console.error(err);
                window.location.href = '/';
            }
            loadPendingCount();
            loadWithdrawCount();
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('collapsed');
        }
        // =========================
        // Hamburger & overlay
        // =========================
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');

            if (window.innerWidth <= 768) {
                sidebar.classList.toggle('active');
                overlay.classList.toggle('active'); // show overlay
            } else {
                sidebar.classList.toggle('collapsed');
            }
        }

        // =========================
        // Load pending approvals count
        // =========================
        async function loadPendingCount() {
            try {
                const res = await fetch('/api/pending-count', {
                    credentials: 'include'
                });

                const data = await res.json();

                const badge = document.getElementById('pendingBadge');

                if (data.count > 0) {
                    badge.style.display = 'inline-block';
                    badge.textContent = data.count;
                } else {
                    badge.style.display = 'none';
                }

            } catch (err) {
                console.error(err);
            }
        }
        function closeSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');

            sidebar.classList.remove('active');
            overlay.classList.remove('active');
        }

        // Close sidebar if click outside (mobile)
        document.addEventListener('click', function(event) {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            if (window.innerWidth <= 768 && sidebar.classList.contains('active')) {
                if (!sidebar.contains(event.target) && !event.target.classList.contains('hamburger')) {
                    closeSidebar();
                }
            }
        });
        
        function showSnackbar(message, success = false) {
            const snackbar = document.getElementById("snackbar");
            snackbar.textContent = message;
            snackbar.className = success ? "show success" : "show";

            setTimeout(() => {
                snackbar.className = snackbar.className.replace("show", "");
            }, 3000);
        }

        // =========================
        // Loading players
        // =========================
        let selectedUserId = null;
        let currentUserId = null;

        async function loadPlayers() {
            try {
                const session = await fetch('/api/dashboard', { credentials: 'include' });
                const user = await session.json();
                currentUserId = user.id;

                const res = await fetch('/api/players', { credentials: 'include' });
                let players = await res.json();

                const filter = document.getElementById('statusFilter').value;
                if (filter) {
                    players = players.filter(p => p.status === filter);
                }

                const table = document.getElementById('playersTable');
                table.innerHTML = '';

                players.forEach(p => {

                    const isDirect = Number(p.parent_id) === Number(currentUserId);

                    const row = document.createElement('tr');
                    console.log("Player parent:", p.parent_id, "Current user:", currentUserId);
                    row.innerHTML = `
                        <td>${p.username}</td>
                        <td>${formatNumber(p.points)}</td><td>${p.points}</td>
                        <td>${p.parent_username || '-'}</td>
                        <td class="status ${p.status}">${p.status}</td>
                        <td class="actions">
                            <button class="btn promote" onclick="promoteUser(${p.id})">
                                ⬆️
                            </button>
                            <button class="btn add ${!isDirect ? 'disabled' : ''}" 
                                onclick="${isDirect ? `openModal(${p.id})` : ''}">
                                ➕
                            </button>

                            <button class="btn ${p.status === 'suspended' ? 'activate' : 'suspend'}"
                                onclick="toggleStatus(${p.id}, '${p.status}')">
                                ${p.status === 'suspended' ? '✅' : '⛔'}
                            </button>

                            <button class="btn reset" onclick="resetPassword(${p.id})">
                                🔑
                            </button>

                        </td>
                    `;

                    table.appendChild(row);
                });

            } catch (err) {
                console.error(err);
            }
        }
        
        // =========================
        // Toggle status
        // =========================
        async function toggleStatus(userId, currentStatus) {
            const newStatus = currentStatus === 'suspended' ? 'offline' : 'suspended';

            await fetch('/api/update-status', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ userId, status: newStatus })
            });

            showSnackbar("Status updated");
            loadPlayers();
        }
        // =========================
        // Reset password
        // =========================
        async function resetPassword(userId) {
            if (!confirm("Reset password to 123456?")) return;

            const res = await fetch('/api/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ userId })
            });

            const data = await res.json();

            showSnackbar(data.message);
        }
        // =========================
        // Loading points modal
        // =========================
        function openModal(userId) {
            selectedUserId = userId;
            document.getElementById('pointsModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('pointsModal').style.display = 'none';
        }

        async function confirmAddPoints() {
            const amount = document.getElementById('pointsInput').value;

            if (!amount || amount <= 0) {
                showSnackbar("Invalid amount");
                return;
            }

            const res = await fetch('/api/add-points', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({
                    userId: selectedUserId,
                    amount: Number(amount)
                })
            });

            const data = await res.json();

            // ✅ HANDLE ERROR FROM SERVER
            if (!res.ok) {
                showSnackbar(data.error);
                return;
            }

            // ✅ SUCCESS
            showSnackbar(data.message, true);

            closeModal();
            loadPlayers();
        }
        // =========================
        // Load withdrawal request count
        // =========================
        async function loadWithdrawCount() {
            try {
                const res = await fetch('/api/withdrawal-count', {
                    credentials: 'include'
                });

                const data = await res.json();

                const badge = document.getElementById('withdrawBadge');

                if (data.count > 0) {
                    badge.style.display = 'inline-block';
                    badge.textContent = data.count;
                } else {
                    badge.style.display = 'none';
                }

            } catch (err) {
                console.error(err);
            }
        }
        // =========================
        // Promote user to agent
        // =========================
        async function promoteUser(userId) {
        try {
            const res = await fetch('/api/promote-user', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ userId })
            });

            const data = await res.json();

            if (!res.ok) {
                showSnackbar(data.error);
                return;
            }

            showSnackbar(data.message, true);
            loadPlayers();

        } catch (err) {
            console.error(err);
            showSnackbar("Server error");
        }
    }
        // Call after session check
        checkSession();
        setInterval(loadWithdrawCount, 10000);
        setInterval(loadPendingCount, 10000);
    </script>

</body>
</html>
