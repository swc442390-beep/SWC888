<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Mapagmahal</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for icons -->
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>
    <div id="snackbar"></div>
    <div class="login-container">
        <!-- Logo -->
        <img src="logo.png" alt="Mapagmahal Logo" class="logo">

        <!-- Site Title -->
        <h1>Mapagmahal</h1>

        <!-- Username Field -->
        <div class="input-group">
            <label for="username">Username</label>
            <div class="input-icon">
                <i class="fas fa-envelope"></i>
                <input type="text" id="username" placeholder="Enter username">
            </div>
        </div>

        <!-- Password Field -->
        <div class="input-group">
            <label for="password">Password</label>
            <div class="input-icon">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Enter password">
            </div>
        </div>

        <!-- Sign In Button -->
        <button onclick="login()">Sign In</button>
    </div>

    <script>
        function showSnackbar(message, type = "success") {
            const bar = document.getElementById("snackbar");

            bar.textContent = message;
            bar.className = "show " + type;

            setTimeout(() => {
                bar.className = bar.className.replace("show", "").trim();
            }, 3000);
        }
        // Login function
        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !password) {
                showSnackbar("Please enter both username and password", "warning");
                return;
            }

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (data.error) {
                    showSnackbar(data.error, "error");
                    return;
                }

                // Redirect based on role
                switch(data.role) {
                    case "admin":
                        showSnackbar("Server error", "error");
                        window.location.href = "admin.html";
                        break;
                    case "player":
                        showSnackbar("Login successful!", "success");
                        window.location.href = "player.html";
                        break;
                    case "master_agent":
                        showSnackbar("Login successful!", "success");
                        showSnackbar("Master Agent panel coming next");
                        break;
                    case "declarator":
                        showSnackbar("Login successful!", "success");
                        showSnackbar("Declarator panel coming next");
                        break;
                    default:
                        showSnackbar("Unknown role");
                }

            } catch (err) {
                showSnackbar("Server error", "error");
                console.error(err);
            }
        }
    </script>
</body>
</html>
