<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - SWC888</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="dashboard-body">

    <!-- SIDEBAR (COPY SAME SIDEBAR HERE) -->
    <div class="sidebar" id="sidebar">
        <h2>Welcome, <span class="username">Player</span></h2>

        <!-- MAIN -->
        <a href="player.html">🏠 Play / Dashboard</a>
        <a href="wallet-logs-player.html">📄 Wallet Transactions</a>
        <a href="#" onclick="openWithdrawModal()">💸 Withdrawal Request</a>

        <div class="category">Account</div>
        <a href="change-password-player.html">🔑 Change Password</a>
        <a href="/api/logout">🚪 Logout</a>
    </div>
<div id="overlay" class="overlay" onclick="closeSidebar()"></div>
    <!-- MAIN -->
    <div class="main">

        <div class="header">
            <div class="hamburger" onclick="toggleSidebar()">☰</div>
        </div>

        <div class="content">
            <h2>Change Password</h2>

            <div class="form-box membership-card">

                <!-- CURRENT PASSWORD -->
                <div class="input-group">
                    <label>Current Password</label>
                    <div class="input-icon">
                        <span class="icon">🔒</span>
                        <input type="password" id="currentPassword" placeholder="Enter current password">
                    </div>
                </div>

                <!-- NEW PASSWORD -->
                <div class="input-group">
                    <label>New Password</label>
                    <div class="input-icon">
                        <span class="icon">🔑</span>
                        <input type="password" id="newPassword" placeholder="Enter new password">
                    </div>
                </div>

                <!-- CONFIRM PASSWORD -->
                <div class="input-group">
                    <label>Confirm New Password</label>
                    <div class="input-icon">
                        <span class="icon">🔑</span>
                        <input type="password" id="confirmPassword" placeholder="Confirm new password">
                    </div>
                </div>

                <!-- BUTTON -->
                <button onclick="changePassword()">Update Password</button>

            </div>
            // MODAL FOR WITHDRAWAL REQUEST
            <div id="withdrawModal" class="modal">
                <div class="modal-content">
                    <h3>Withdrawal Request</h3>

                    <input type="number" id="withdrawAmount" placeholder="Enter points" />

                    <div style="margin-top:10px;">
                        <button onclick="submitWithdraw()">Submit</button>
                        <button onclick="closeWithdrawModal()">Cancel</button>
                    </div>
                </div>
            </div>
            <div id="snackbar"></div>
        </div>


        <footer>
            © 2024 SWC888. All rights reserved.
        </footer>

    </div>

    <script>
        async function checkSession() {
            try {
                const res = await fetch('/api/dashboard', {
                    credentials: 'include'
                });

                if (res.status === 401) {
                    window.location.href = '/';
                    return;
                }

                const data = await res.json();

                document.querySelectorAll('.username')
                    .forEach(el => el.textContent = data.username);

            } catch (err) {
                console.error(err);
                window.location.href = '/';
            }
            loadPendingCount();
            setInterval(loadPendingCount, 10000);
        }

        // =========================
        // Hamburger & overlay
        // =========================
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');

            if (window.innerWidth <= 768) {
                sidebar.classList.toggle('active');
                overlay.classList.toggle('active'); // show overlay
            } else {
                sidebar.classList.toggle('collapsed');
            }
        }

        
        function closeSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');

            sidebar.classList.remove('active');
            overlay.classList.remove('active');
        }

        // Close sidebar if click outside (mobile)
        document.addEventListener('click', function(event) {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            if (window.innerWidth <= 768 && sidebar.classList.contains('active')) {
                if (!sidebar.contains(event.target) && !event.target.classList.contains('hamburger')) {
                    closeSidebar();
                }
            }
        });
        
        function showSnackbar(message, success = false) {
            const snackbar = document.getElementById("snackbar");
            snackbar.textContent = message;
            snackbar.className = success ? "show success" : "show";

            setTimeout(() => {
                snackbar.className = snackbar.className.replace("show", "");
            }, 3000);
        }

        // =========================
        // Change password function
        // =========================
        async function changePassword() {
            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Validation
            if (!currentPassword || !newPassword || !confirmPassword) {
                showSnackbar("All fields are required");
                return;
            }

            if (newPassword !== confirmPassword) {
                showSnackbar("Passwords do not match");
                return;
            }

            try {
                const res = await fetch('/api/change-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ currentPassword, newPassword })
                });

                const data = await res.json();

                if (!res.ok) {
                    showSnackbar(data.error);
                    return;
                }

                showSnackbar("Password updated successfully", true);

                // Clear fields
                document.getElementById('currentPassword').value = '';
                document.getElementById('newPassword').value = '';
                document.getElementById('confirmPassword').value = '';

            } catch (err) {
                console.error(err);
                showSnackbar("Server error");
            }
        }
         // Withdrawal Modal
        function openWithdrawModal(){
            document.getElementById('withdrawModal').style.display = 'flex';
        }

        function closeWithdrawModal(){
            document.getElementById('withdrawModal').style.display = 'none';
        }

        async function submitWithdraw(){
            const amount = Number(document.getElementById('withdrawAmount').value);
            const balance = Number(document.getElementById('balance').textContent);

            if (!amount || amount <= 0) {
                return showSnackbar("Enter valid amount", "warning");
            }

            if (amount > balance) {
                return showSnackbar("Insufficient balance", "error");
            }

            try {
                const res = await fetch('/api/withdraw-request', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ amount })
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.error || "Request failed");
                }

                showSnackbar("Withdrawal request submitted!");
                closeWithdrawModal();

                document.getElementById('withdrawAmount').value = '';

            } catch (err) {
                console.error(err);
                showSnackbar(err.message, "error");
            }
        }
        document.addEventListener('contextmenu', function (e) {
            e.preventDefault();
        });
        document.addEventListener('keydown', function (e) {
            if (
                e.key === "F12" ||
                (e.ctrlKey && e.shiftKey && e.key === "I") ||
                (e.ctrlKey && e.shiftKey && e.key === "J") ||
                (e.ctrlKey && e.key === "U")
            ) {
                e.preventDefault();
            }
        });
        setInterval(() => {
            const threshold = 160;
            if (
                window.outerWidth - window.innerWidth > threshold ||
                window.outerHeight - window.innerHeight > threshold
            ) {
                // optional: logout or redirect
                window.location.href = "/api/logout";
            }
        }, 1000);
        checkSession();
    </script>
    <script src="js/layout.js"></script>
</body>
</html>
