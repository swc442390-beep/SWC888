<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - SWC888</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="dashboard-body">

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
    <h2>Welcome, <span class="username">Declarator</span></h2>

    <a href="declarator.html">🏠 Dashboard</a>
    <a href="#">📺 Video Stream</a>
    <a href="#">⚙️ Settings</a>

    <div class="category">Account</div>
    <a href="change-password-declarator.html">🔑 Change Password</a>
    <a href="/api/logout">🚪 Logout</a>
</div>

<div id="overlay" class="overlay" onclick="closeSidebar()"></div>

<div class="main">
<div class="header">
    <div class="hamburger" onclick="toggleSidebar()">☰</div>
</div>

<div class="content">

    <div id="snackbar"></div>
    <h2>Change Password</h2>

    <div class="form-box membership-card">

        <!-- CURRENT PASSWORD -->
        <div class="input-group">
            <label>Current Password</label>
            <div class="input-icon">
                <span class="icon">🔒</span>
                <input type="password" id="currentPassword" placeholder="Enter current password" required>
            </div>
        </div>

        <!-- NEW PASSWORD -->
        <div class="input-group">
            <label>New Password</label>
            <div class="input-icon">
                <span class="icon">🔑</span>
                <input type="password" id="newPassword" placeholder="Enter new password" required>
            </div>
        </div>

        <!-- CONFIRM PASSWORD -->
        <div class="input-group">
            <label>Confirm New Password</label>
            <div class="input-icon">
                <span class="icon">🔑</span>
                <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
            </div>
        </div>

        <!-- BUTTON -->
        <button onclick="changePassword()">Update Password</button>
    </div>
</div>
<footer>
    © 2024 SWC888. All rights reserved.
</footer>

</div>

<script>
    
    let userId = null;

    
    async function checkSession(requiredRole = null) {
        try {
            const res = await fetch('/api/dashboard', {
                credentials: 'include'
            });
            
            if (res.status === 401) {
                window.location.href = '/';
                return;
            }

            const data = await res.json();

            // ✅ Set username
            document.querySelectorAll('.username')
                .forEach(el => el.textContent = data.username);
            
            userId = data.id;

            

            // 🔥 ROLE PROTECTION
            if (requiredRole && data.role !== requiredRole) {
                showSnackbar("Unauthorized access");
                window.location.href = '/';
            }
            
        } catch (err) {
            console.error(err);
            window.location.href = '/';
        }
    }
    
    // =========================
            // Change password function
            // =========================
            async function changePassword() {
                const currentPassword = document.getElementById('currentPassword').value;
                const newPassword = document.getElementById('newPassword').value;
                const confirmPassword = document.getElementById('confirmPassword').value;

                // Validation
                if (!currentPassword || !newPassword || !confirmPassword) {
                    showSnackbar("All fields are required");
                    return;
                }

                if (newPassword !== confirmPassword) {
                    showSnackbar("Passwords do not match");
                    return;
                }

                try {
                    const res = await fetch('/api/change-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        credentials: 'include',
                        body: JSON.stringify({ currentPassword, newPassword })
                    });

                    const data = await res.json();

                    if (!res.ok) {
                        showSnackbar(data.error);
                        return;
                    }

                    showSnackbar("Password updated successfully", true);

                    // Clear fields
                    document.getElementById('currentPassword').value = '';
                    document.getElementById('newPassword').value = '';
                    document.getElementById('confirmPassword').value = '';

                } catch (err) {
                    console.error(err);
                    showSnackbar("Server error");
                }
            }
  

    
    /* SIDEBAR */
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');

        if (window.innerWidth <= 768) {
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        } else {
            sidebar.classList.toggle('collapsed');
        }
    }

    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('active');
        document.getElementById('overlay').classList.remove('active');
    }
    
    // 📢 SHOW SNACKBAR
    function showSnackbar(message, type = "success") {
        const sb = document.getElementById("snackbar");

        sb.className = ""; // RESET

        sb.textContent = message;

        if(type === "error") sb.classList.add("error");
        if(type === "warning") sb.classList.add("warning");

        sb.classList.add("show");

        setTimeout(()=>{
            sb.classList.remove("show");
        },3000);
    }
    checkSession('declarator');
   
</script>

</body>
</html>
