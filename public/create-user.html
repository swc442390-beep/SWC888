<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create User - SWC888</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="login-container">

    <!-- LOGO + TITLE -->
    <div class="brand">
        <img src="logo.png" alt="Logo" class="logo">
        <h1>SWC888</h1>
    </div>

    <h2>Create Account</h2>

    <input type="text" id="username" placeholder="Username"><br>

    <!-- PASSWORD -->
    <div class="password-wrapper">
        <input type="password" id="password" placeholder="Password">
        <span onclick="togglePassword('password', this)">👁️</span>
    </div>

    <!-- CONFIRM PASSWORD -->
    <div class="password-wrapper">
        <input type="password" id="confirmPassword" placeholder="Confirm Password">
        <span onclick="togglePassword('confirmPassword', this)">👁️</span>
    </div>

    <input type="text" id="role" placeholder="Role (admin, master_agent, player, declarator)"><br>

    <input type="number" id="parent_id" placeholder="Parent ID (optional)"><br>

    <button onclick="createUser()">Create Account</button>

</div>

<!-- SNACKBAR -->
<div id="snackbar"></div>

<script>
// =========================
// Toggle Password Visibility
// =========================
function togglePassword(id, el) {
    const input = document.getElementById(id);
    if (input.type === "password") {
        input.type = "text";
        el.textContent = "🙈";
    } else {
        input.type = "password";
        el.textContent = "👁️";
    }
}

// =========================
// Snackbar
// =========================
function showSnackbar(message, type = "success") {
    const snackbar = document.getElementById("snackbar");

    snackbar.textContent = message;
    snackbar.className = "";
    snackbar.classList.add(type);
    snackbar.classList.add("show");

    setTimeout(() => {
        snackbar.classList.remove("show");
    }, 3000);
}

// =========================
// Create User
// =========================
async function createUser() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const role = document.getElementById('role').value.trim();
    const parent_id = document.getElementById('parent_id').value;

    // VALIDATION
    if (!username || !password || !role) {
        showSnackbar("Please fill all required fields", "error");
        return;
    }

    if (password !== confirmPassword) {
        showSnackbar("Passwords do not match", "error");
        return;
    }

    try {
        const res = await fetch('/api/create-user', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({
                username,
                password,
                role,
                parent_id: parent_id || null
            })
        });

        const data = await res.json();

        if (data.error) {
            showSnackbar(data.error, "error");
        } else {
            showSnackbar("User created successfully!", "success");

            // Clear fields
            document.getElementById('username').value = "";
            document.getElementById('password').value = "";
            document.getElementById('confirmPassword').value = "";
            document.getElementById('role').value = "";
            document.getElementById('parent_id').value = "";
        }

    } catch (err) {
        console.error(err);
        showSnackbar("Server error", "error");
    }
}
</script>

</body>
</html>
