<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Change Password - SWC888</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="dashboard-body">

    <!-- SIDEBAR (COPY SAME SIDEBAR HERE) -->
    <div class="sidebar" id="sidebar">
        <h2>Welcome, <span class="username">Agent</span></h2>

        <a href="admin.html">🏠 Dashboard</a>
        <a href="summary.html" id="summaryLink">📊 Summary Report</a>
        <a href="wallet-logs.html">📄 Wallet Logs</a>
        <a href="commission-logs.html">💰 Commission Logs</a>
        <a href="withdrawal.html">💸 Commission Withdrawals 
            <span id="withdrawBadge" class="badge blue" style="display:none;">0</span>
        </a>
        <!--<a href="archives.html">🗂 Archives</a>-->

        <div class="category">Downlines</div>
        <a href="agents.html">👥 Agents</a>
        <a href="players.html">🧑 Players</a>
        <a href="pending.html">⏳ Pending Approvals 
            <span id="pendingBadge" class="badge red" style="display:none;">0</span>
        </a>

        <div class="category">Settings</div>
        <!--<a href="account.html">👥 Account Management</a>-->
        <a href="change-password.html">🔑 Change Password</a>
        <a href="#" onclick="logout()">🚪 Logout</a>
    </div>
<div id="overlay" class="overlay" onclick="closeSidebar()"></div>
    <!-- MAIN -->
    <div class="main">

        <div class="header">
            <div class="hamburger" onclick="toggleSidebar()">☰</div>
        </div>

        <div class="content">
            <h2>Change Password</h2>

            <div class="form-box membership-card">

                <!-- CURRENT PASSWORD -->
                <div class="input-group">
                    <label>Current Password</label>
                    <div class="input-icon">
                        <span class="icon">🔒</span>
                        <input type="password" id="currentPassword" placeholder="Enter current password">
                    </div>
                </div>

                <!-- NEW PASSWORD -->
                <div class="input-group">
                    <label>New Password</label>
                    <div class="input-icon">
                        <span class="icon">🔑</span>
                        <input type="password" id="newPassword" placeholder="Enter new password">
                    </div>
                </div>

                <!-- CONFIRM PASSWORD -->
                <div class="input-group">
                    <label>Confirm New Password</label>
                    <div class="input-icon">
                        <span class="icon">🔑</span>
                        <input type="password" id="confirmPassword" placeholder="Confirm new password">
                    </div>
                </div>

                <!-- BUTTON -->
                <button onclick="changePassword()">Update Password</button>

            </div>

            <div id="snackbar"></div>
        </div>


        <footer>
            © 2024 SWC888. All rights reserved.
        </footer>

    </div>

    <script>
        async function checkSession() {
            try {
                const res = await fetch('/api/dashboard', {
                    credentials: 'include'
                });

                if (res.status === 401) {
                    window.location.href = '/';
                    return;
                }

                const data = await res.json();
                if (data.role !== 'admin') {
                    const summaryLink = document.getElementById('summaryLink');
                    if (summaryLink) summaryLink.style.display = 'none';
                }
                document.querySelectorAll('.username')
                    .forEach(el => el.textContent = data.username);

            } catch (err) {
                console.error(err);
                window.location.href = '/';
            }
            loadPendingCount();
            loadWithdrawCount();
        }

        // =========================
        // Hamburger & overlay
        // =========================
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');

            if (window.innerWidth <= 768) {
                sidebar.classList.toggle('active');
                overlay.classList.toggle('active'); // show overlay
            } else {
                sidebar.classList.toggle('collapsed');
            }
        }

        // =========================
        // Load pending approvals count
        // =========================
        async function loadPendingCount() {
            try {
                const res = await fetch('/api/pending-count', {
                    credentials: 'include'
                });

                const data = await res.json();

                const badge = document.getElementById('pendingBadge');

                if (data.count > 0) {
                    badge.style.display = 'inline-block';
                    badge.textContent = data.count;
                } else {
                    badge.style.display = 'none';
                }

            } catch (err) {
                console.error(err);
            }
        }
        function closeSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');

            sidebar.classList.remove('active');
            overlay.classList.remove('active');
        }

        // Close sidebar if click outside (mobile)
        document.addEventListener('click', function(event) {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            if (window.innerWidth <= 768 && sidebar.classList.contains('active')) {
                if (!sidebar.contains(event.target) && !event.target.classList.contains('hamburger')) {
                    closeSidebar();
                }
            }
        });
        
        function showSnackbar(message, success = false) {
            const snackbar = document.getElementById("snackbar");
            snackbar.textContent = message;
            snackbar.className = success ? "show success" : "show";

            setTimeout(() => {
                snackbar.className = snackbar.className.replace("show", "");
            }, 3000);
        }

        // =========================
        // Change password function
        // =========================
        async function changePassword() {
            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Validation
            if (!currentPassword || !newPassword || !confirmPassword) {
                showSnackbar("All fields are required");
                return;
            }

            if (newPassword !== confirmPassword) {
                showSnackbar("Passwords do not match");
                return;
            }

            try {
                const res = await fetch('/api/change-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ currentPassword, newPassword })
                });

                const data = await res.json();

                if (!res.ok) {
                    showSnackbar(data.error);
                    return;
                }

                showSnackbar("Password updated successfully", true);

                // Clear fields
                document.getElementById('currentPassword').value = '';
                document.getElementById('newPassword').value = '';
                document.getElementById('confirmPassword').value = '';

            } catch (err) {
                console.error(err);
                showSnackbar("Server error");
            }
        }
        // =========================
        // Load withdrawal request count
        // =========================
        async function loadWithdrawCount() {
            try {
                const res = await fetch('/api/withdrawal-count', {
                    credentials: 'include'
                });

                const data = await res.json();

                const badge = document.getElementById('withdrawBadge');

                if (data.count > 0) {
                    badge.style.display = 'inline-block';
                    badge.textContent = data.count;
                } else {
                    badge.style.display = 'none';
                }

            } catch (err) {
                console.error(err);
            }
        }
        //Code for logout
        async function logout() {
            try {
                const res = await fetch('/api/logout', {
                    method: 'GET',
                    credentials: 'include'
                });

                const data = await res.json();
                console.log(data);

                // ✅ Redirect after logout
                showSnackbar("Logged out successfully");

                setTimeout(() => {
                    window.location.href = '/index.html';
                }, 1000);

            } catch (err) {
                console.error(err);
                showSnackbar("Logout failed", "error");
            }
        }
        // Call after session check
        checkSession();
        setInterval(loadWithdrawCount, 10000);
        setInterval(loadPendingCount, 10000);
    </script>
    <script src="js/layout.js"></script>
</body>
</html>
