<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Summary Report - SWC888</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="dashboard-body">

    <!-- SIDEBAR (COPY SAME SIDEBAR HERE) -->
    <div class="sidebar" id="sidebar">
        <h2>Welcome, <span class="username">Agent</span></h2>

        <a href="admin.html">🏠 Dashboard</a>
        <a href="summary.html" id="summaryLink">📊 Summary Report</a>
        <a href="wallet-logs.html">📄 Wallet Logs</a>
        <a href="commission-logs.html">💰 Commission Logs</a>
        <a href="withdrawal.html">💸 Commission Withdrawals 
            <span id="withdrawBadge" class="badge blue" style="display:none;">0</span>
        </a>
        <!--<a href="archives.html">🗂 Archives</a>-->

        <div class="category">Downlines</div>
        <a href="agents.html">👥 Agents</a>
        <a href="players.html">🧑 Players</a>
        <a href="pending.html">⏳ Pending Approvals 
            <span id="pendingBadge" class="badge red" style="display:none;">0</span>
        </a>

        <div class="category">Settings</div>
        <!--<a href="account.html">👥 Account Management</a>-->
        <a href="change-password.html">🔑 Change Password</a>
        <a href="#" onclick="logout()">🚪 Logout</a>
    </div>
     <!-- Overlay for mobile -->
    <div id="overlay" class="overlay" onclick="closeSidebar()"></div>
    <!-- MAIN -->
    <div class="main">

        <div class="header">
            <div class="hamburger" onclick="toggleSidebar()">☰</div>
        </div>

        <div class="content">
            <h2>Commission Summary</h2>

            <!-- FILTERS -->
            <div class="filters">
                <input type="text" id="search" placeholder="Search event name">
                <input type="date" id="from">
                <input type="date" id="to">
                <button onclick="loadCommissionSummary()">Search</button>
            </div>

            <div class="table-wrapper">
                <table class="styled-table" id="walletTable">
                    <thead>
                        <tr>
                            <th>Event Name</th>
                            <th>Created At</th>
                            <th>Total Commission</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <footer>
            © 2024 SWC888. All rights reserved.
        </footer>

    </div>

    <script>
        async function checkSession() {
            try {
                const res = await fetch('/api/dashboard', {
                    credentials: 'include'
                });

                if (res.status === 401) {
                    window.location.href = '/';
                    return;
                }

                const data = await res.json();
                if (data.role !== 'admin') {
                    const summaryLink = document.getElementById('summaryLink');
                    if (summaryLink) summaryLink.style.display = 'none';
                }
                document.querySelectorAll('.username')
                    .forEach(el => el.textContent = data.username);

            } catch (err) {
                console.error(err);
                window.location.href = '/';
            }
            loadPendingCount();
            loadWithdrawCount();
        }

        // =========================
        // Hamburger & overlay
        // =========================
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');

            if (window.innerWidth <= 768) {
                sidebar.classList.toggle('active');
                overlay.classList.toggle('active'); // show overlay
            } else {
                sidebar.classList.toggle('collapsed');
            }
        }

        function closeSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');

            sidebar.classList.remove('active');
            overlay.classList.remove('active');
        }

        // Close sidebar if click outside (mobile)
        document.addEventListener('click', function(event) {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            if (window.innerWidth <= 768 && sidebar.classList.contains('active')) {
                if (!sidebar.contains(event.target) && !event.target.classList.contains('hamburger')) {
                    closeSidebar();
                }
            }
        });

        
        // =========================
        // Load withdrawal request count
        // =========================
        async function loadWithdrawCount() {
            try {
                const res = await fetch('/api/withdrawal-count', {
                    credentials: 'include'
                });

                const data = await res.json();

                const badge = document.getElementById('withdrawBadge');

                if (data.count > 0) {
                    badge.style.display = 'inline-block';
                    badge.textContent = data.count;
                } else {
                    badge.style.display = 'none';
                }

            } catch (err) {
                console.error(err);
            }
        }
        // =========================
        // Load pending approval count
        // =========================
        async function loadPendingCount() {
            try {
                const res = await fetch('/api/pending-count', {
                    credentials: 'include'
                });

                const data = await res.json();

                const badge = document.getElementById('pendingBadge');

                if (data.count > 0) {
                    badge.style.display = 'inline-block';
                    badge.textContent = data.count;
                } else {
                    badge.style.display = 'none';
                }

            } catch (err) {
                console.error(err);
            }
        }
        async function loadCommissionSummary() {
            try {
                const search = document.getElementById('search')?.value || '';
                const from = document.getElementById('from')?.value || '';
                const to = document.getElementById('to')?.value || '';

                const params = new URLSearchParams({ search, from, to });

                const res = await fetch(`/api/commission-summary?${params}`, {
                    credentials: 'include'
                });

                const data = await res.json();
                console.log("SUMMARY DATA:", data); // DEBUG

                const tbody = document.querySelector('#walletTable tbody');
                tbody.innerHTML = '';

                if (!data.length) {
                    tbody.innerHTML = `<tr><td colspan="3">No data found</td></tr>`;
                    return;
                }

                data.forEach(row => {
                    const tr = document.createElement('tr');

                    tr.innerHTML = `
                        <td>${row.event_name}</td>
                        <td>${row.created_at ? new Date(row.created_at).toLocaleString() : '-'}</td>
                        <td>${Number(row.total_commission).toFixed(2)}</td>
                    `;

                    tbody.appendChild(tr);
                });

            } catch (err) {
                console.error(err);
            }
        }
        //Code for logout
        async function logout() {
            try {
                const res = await fetch('/api/logout', {
                    method: 'GET',
                    credentials: 'include'
                });

                const data = await res.json();
                console.log(data);

                // ✅ Redirect after logout
                showSnackbar("Logged out successfully");

                setTimeout(() => {
                    window.location.href = '/index.html';
                }, 1000);

            } catch (err) {
                console.error(err);
                showSnackbar("Logout failed", "error");
            }
        }
        checkSession();
        loadCommissionSummary();
        setInterval(loadWithdrawCount, 10000);
        setInterval(loadPendingCount, 10000);
    </script>

</body>
</html>
