<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pending Approvals - SWC888</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="dashboard-body">

    <!-- SIDEBAR (COPY SAME SIDEBAR HERE) -->
    <div class="sidebar" id="sidebar">
        <h2>Welcome, <span class="username">Agent</span></h2>

        <a href="admin.html">🏠 Dashboard</a>
        <a href="summary.html" id="summaryLink">📊 Summary Report</a><a href="summary.html">📊 Summary Report</a>
        <a href="wallet-logs.html">📄 Wallet Logs</a>
        <a href="commission-logs.html">💰 Commission Logs</a>
        <a href="withdrawal.html">💸 Commission Withdrawals 
            <span id="withdrawBadge" class="badge blue" style="display:none;">0</span>
        </a>
        <!--<a href="archives.html">🗂 Archives</a>-->

        <div class="category">Downlines</div>
        <a href="agents.html">👥 Agents</a>
        <a href="players.html">🧑 Players</a>
        <a href="pending.html">⏳ Pending Approvals 
            <span id="pendingBadge" class="badge red" style="display:none;">0</span>
        </a>

        <div class="category">Settings</div>
        <!--<a href="account.html">👥 Account Management</a>-->
        <a href="change-password.html">🔑 Change Password</a>
        <a href="#" onclick="logout()">🚪 Logout</a>
    </div>

    <!-- MAIN -->
    <div class="main">

        <div class="header">
            <div class="hamburger" onclick="toggleSidebar()">☰</div>
        </div>

        <div class="content">
            <h2>Pending Approvals</h2>

            <div class="membership-card">
                <table class="pending-table">
                    <thead>
                        <tr>
                            <th>Username</th>
                            <th>Date</th>
                            <th>Role</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="pendingTableBody">
                        <!-- Data here -->
                    </tbody>
                </table>
            </div>

            <div id="snackbar"></div>
        </div>

        <footer>
            © 2024 SWC888. All rights reserved.
        </footer>

    </div>

    <script>
        async function checkSession() {
            try {
                const res = await fetch('/api/dashboard', {
                    credentials: 'include'
                });

                if (res.status === 401) {
                    window.location.href = '/';
                    return;
                }

                const data = await res.json();
                if (data.role !== 'admin') {
                    const summaryLink = document.getElementById('summaryLink');
                    if (summaryLink) summaryLink.style.display = 'none';
                }
                document.querySelectorAll('.username')
                    .forEach(el => el.textContent = data.username);

            } catch (err) {
                console.error(err);
                window.location.href = '/';
            }
            loadPendingCount();
            loadWithdrawCount();
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('collapsed');
        }

        // =========================
        // Hamburger & overlay
        // =========================
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');

            if (window.innerWidth <= 768) {
                sidebar.classList.toggle('active');
                overlay.classList.toggle('active'); // show overlay
            } else {
                sidebar.classList.toggle('collapsed');
            }
        }

        // =========================
        // Load pending approvals count
        // =========================
        async function loadPendingCount() {
            try {
                const res = await fetch('/api/pending-count', {
                    credentials: 'include'
                });

                const data = await res.json();

                const badge = document.getElementById('pendingBadge');

                if (data.count > 0) {
                    badge.style.display = 'inline-block';
                    badge.textContent = data.count;
                } else {
                    badge.style.display = 'none';
                }

            } catch (err) {
                console.error(err);
            }
        }
        function closeSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');

            sidebar.classList.remove('active');
            overlay.classList.remove('active');
        }

        // Close sidebar if click outside (mobile)
        document.addEventListener('click', function(event) {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            if (window.innerWidth <= 768 && sidebar.classList.contains('active')) {
                if (!sidebar.contains(event.target) && !event.target.classList.contains('hamburger')) {
                    closeSidebar();
                }
            }
        });
        
        function showSnackbar(message, success = false) {
            const snackbar = document.getElementById("snackbar");
            snackbar.textContent = message;
            snackbar.className = success ? "show success" : "show";

            setTimeout(() => {
                snackbar.className = snackbar.className.replace("show", "");
            }, 3000);
        }
        // =========================
        // LOAD PENDING USERS
        // =========================
        async function loadPendingUsers() {
            try {
                const res = await fetch('/api/pending-users', {
                    credentials: 'include'
                });

                const users = await res.json();

                const table = document.getElementById('pendingTableBody');
                table.innerHTML = '';

                if (users.length === 0) {
                    table.innerHTML = `<tr><td colspan="4">No pending users</td></tr>`;
                    return;
                }

                users.forEach(user => {
                    const row = document.createElement('tr');

                    row.innerHTML = `
                        <td>${user.username}</td>
                        <td>${new Date(user.created_at).toLocaleString()}</td>
                        <td>
                            <select id="role-${user.id}" hidden>
                                <option value="master_agent">Incorporator</option>
                                <option value="sub_agent">Master Agent</option>
                                <option value="agent">Gold Agent</option>
                                <option value="player" selected>Player</option>
                                <option value="declarator">Declarator</option>
                            </select> Player
                        </td>
                        <td>
                            <button onclick="approveUser(${user.id})">Approve</button>
                            <button onclick="rejectUser(${user.id})">Reject</button>
                        </td>
                    `;

                    table.appendChild(row);
                });

            } catch (err) {
                console.error(err);
            }
        }

        // =========================
        // APPROVE USER
        // =========================
        async function approveUser(userId) {
            const role = "player"; // always assign player

            try {
                const res = await fetch('/api/approve-user', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ userId, role })
                });

                const data = await res.json();

                if (!res.ok) {
                    showSnackbar(data.error, "error");
                    return;
                }

                showSnackbar("User approved", "success");
               

            } catch (err) {
                console.error(err);
                showSnackbar("Server error", "error");
            }
             loadPendingUsers();
                loadPendingCount();
                loadPendingUsers();
        }

        // =========================
        // REJECT USER
        // =========================
        async function rejectUser(userId) {
            try {
                const res = await fetch('/api/reject-user', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ userId })
                });

                const data = await res.json();

                if (!res.ok) {
                    showSnackbar(data.error, "error");
                    return;
                }

                showSnackbar("User rejected", "warning");
                loadPendingUsers();
                loadPendingCount();

            } catch (err) {
                console.error(err);
                showSnackbar("Server error", "error");
            }
        }

        // =========================
        // Load withdrawal request count
        // =========================
        async function loadWithdrawCount() {
            try {
                const res = await fetch('/api/withdrawal-count', {
                    credentials: 'include'
                });

                const data = await res.json();

                const badge = document.getElementById('withdrawBadge');

                if (data.count > 0) {
                    badge.style.display = 'inline-block';
                    badge.textContent = data.count;
                } else {
                    badge.style.display = 'none';
                }

            } catch (err) {
                console.error(err);
            }
        }
        //Code for logout
        async function logout() {
            try {
                const res = await fetch('/api/logout', {
                    method: 'GET',
                    credentials: 'include'
                });

                const data = await res.json();
                console.log(data);

                // ✅ Redirect after logout
                showSnackbar("Logged out successfully");

                setTimeout(() => {
                    window.location.href = '/index.html';
                }, 1000);

            } catch (err) {
                console.error(err);
                showSnackbar("Logout failed", "error");
            }
        }
        // Call after session check
        checkSession();
        loadPendingUsers();
        setInterval(loadWithdrawCount, 10000);
        setInterval(loadPendingCount, 10000);
    </script>

</body>
</html>
