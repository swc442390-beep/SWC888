<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player - Pitwarriors619</title>
<link rel="stylesheet" href="style.css">

<style>
.video-container { width:100%; aspect-ratio:16/9; margin-bottom:15px; }
.video-container iframe { width:100%; height:100%; border:none; }

.betting-card { background:#1e293b; border-radius:12px; padding:15px; }

.row { display:flex; justify-content:space-between; margin-bottom:8px; }
.header-row { font-weight:bold; color:#14b8a6; }

.status.OPEN { color:#2ecc71; }
.status.CLOSED { color:#f1c40f; }
.status.CANCELLED { color:#e74c3c; }

.total-box { width:48%; padding:10px; border-radius:6px; font-weight:bold; }
.meron-bg { background:#7f1d1d; }
.wala-bg { background:#1e3a8a; }

.label-row div { width:50%; text-align:center; padding:10px; font-weight:bold; }
.label-meron { background:#dc2626; }
.label-wala { background:#2563eb; }

.half { width:50%; text-align:center; }

.bet-buttons { display:flex; gap:10px; margin-top:10px; }
.bet-btn { flex:1; padding:12px; font-weight:bold; }
.bet-meron { background:#dc2626; }
.bet-wala { background:#2563eb; }

.balance-box { margin-top:10px; padding:10px; background:#0f172a; border:1px solid #14b8a6; border-radius:6px; text-align:center; }

.amount-input { width:100%; padding:10px; margin-top:10px; border-radius:6px; border:none; }

.chips { display:flex; gap:5px; overflow-x:auto; margin-top:10px; }
.chips button { padding:6px 10px; font-size:12px; }
</style>
</head>

<body class="dashboard-body">

<div class="main">
<div class="content">

<div class="video-container">
<iframe src="https://embed.api.video/live/li4wiTHdydMdEvcXddSAdd3d" allowfullscreen></iframe>
</div>

<div class="betting-card">

<div class="row header-row">
<div>BETTING</div>
<div>FIGHT # <span id="fightNumber">0</span></div>
</div>

<div class="row">
<div>Status:</div>
<div id="betStatus" class="status OPEN">OPEN</div>
</div>

<div class="row">
<div class="total-box meron-bg">MERON: <span id="totalMeron">0</span></div>
<div class="total-box wala-bg">WALA: <span id="totalWala">0</span></div>
</div>

<div class="row label-row">
<div class="label-meron">MERON</div>
<div class="label-wala">WALA</div>
</div>

<div class="row">
<div class="half">PAYOUT: <span id="payoutMeron">0</span></div>
<div class="half">PAYOUT: <span id="payoutWala">0</span></div>
</div>

<div class="row">
<div class="half">
Your Bet: <span id="myMeron">0</span><br>
Win: <span id="winMeron">0</span>
</div>
<div class="half">
Your Bet: <span id="myWala">0</span><br>
Win: <span id="winWala">0</span>
</div>
</div>

<div class="bet-buttons">
<button class="bet-btn bet-meron" onclick="placeBet('meron')">BET MERON</button>
<button class="bet-btn bet-wala" onclick="placeBet('wala')">BET WALA</button>
</div>

<div class="balance-box">
Balance: <span id="balance">0</span>
</div>

<input type="number" id="betAmount" class="amount-input" placeholder="Enter amount">

<div class="chips">
<button onclick="setAmount(20)">20</button>
<button onclick="setAmount(50)">50</button>
<button onclick="setAmount(100)">100</button>
<button onclick="setAmount(200)">200</button>
<button onclick="setAmount(500)">500</button>
<button onclick="setAmount(1000)">1000</button>
</div>

</div>
</div>
</div>

<script>
    let payoutMeron = 0;
    let payoutWala = 0;

    function setAmount(val){
        document.getElementById('betAmount').value = val;
        updatePreview();
    }

    function placeBet(side){
        const amount = Number(document.getElementById('betAmount').value);
        if (!amount) return alert("Enter amount");
        alert(`Bet ${side.toUpperCase()} = ${amount}`);
    }

    // 🔥 LIVE PREVIEW
    function updatePreview(){
        const amount = Number(document.getElementById('betAmount').value) || 0;

        document.getElementById('winMeron').textContent =
            (amount * payoutMeron).toFixed(2);

        document.getElementById('winWala').textContent =
            (amount * payoutWala).toFixed(2);
    }

    document.getElementById('betAmount').addEventListener('input', updatePreview);

    async function fetchGame(){
        try{
            const res = await fetch('/api/game-status',{credentials:'include'});
            const data = await res.json();

            document.getElementById('fightNumber').textContent = data.fightNumber;
            document.getElementById('totalMeron').textContent = data.totalMeron;
            document.getElementById('totalWala').textContent = data.totalWala;

            const totalPool = data.totalMeron + data.totalWala;
            const CUT = 0.915;

            payoutMeron = data.totalMeron ? (totalPool / data.totalMeron) * CUT : 0;
            payoutWala = data.totalWala ? (totalPool / data.totalWala) * CUT : 0;

            document.getElementById('payoutMeron').textContent =
                (payoutMeron * 100).toFixed(2);

            document.getElementById('payoutWala').textContent =
                (payoutWala * 100).toFixed(2);

            const myMeron = Number(data.myMeron || 0);
            const myWala = Number(data.myWala || 0);

            document.getElementById('myMeron').textContent = myMeron;
            document.getElementById('myWala').textContent = myWala;

            // ✅ Only update win if no manual input (prevents override)
            const currentInput = Number(document.getElementById('betAmount').value);

            if (!currentInput){
                document.getElementById('winMeron').textContent =
                    (myMeron * payoutMeron).toFixed(2);

                document.getElementById('winWala').textContent =
                    (myWala * payoutWala).toFixed(2);
            }

            const status = document.getElementById('betStatus');
            status.textContent = data.status;
            status.className = "status " + data.status;

        }catch(e){
            console.error(e);
        }
    }

    setInterval(fetchGame,3000);
    fetch('/api/place-bet')
    fetchGame();
</script>

</body>
</html>
