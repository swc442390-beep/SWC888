<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player - Pitwarriors619</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="dashboard-body">

    <!-- SIDEBAR (PLAYER ONLY) -->
    <div class="sidebar" id="sidebar">
        <h2>Welcome, <span class="username">Player</span></h2>

        <a href="player.html">🎮 Live Game</a>
        <a href="change-password.html">🔑 Change Password</a>
        <a href="/api/logout">🚪 Logout</a>
    </div>

    <!-- MAIN -->
    <div class="main">

        <div class="header">
            <div class="hamburger" onclick="toggleSidebar()">☰</div>
        </div>

        <div class="content">

            <!-- VIDEO -->
            <div class="membership-card">
                <h2>Live Stream</h2>
                <iframe 
                    src="https://embed.api.video/live/li4wiTHdydMdEvcXddSAdd3d"
                    width="100%" 
                    height="400"
                    frameborder="0"
                    scrolling="no"
                    allowfullscreen="true">
                </iframe>
            </div>

            <!-- BETTING SECTION -->
            <div class="membership-card">
                <h2>Place Bet</h2>

                <div class="input-group">
                    <label>Choose Side</label>
                    <select id="betSide" class="styled-select">
                        <option value="">Select</option>
                        <option value="player">Player</option>
                        <option value="banker">Banker</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Amount</label>
                    <input type="number" id="betAmount" placeholder="Enter amount">
                </div>

                <button onclick="placeBet()">Place Bet</button>
            </div>

            <!-- GAME HISTORY -->
            <div class="membership-card">
                <h2>Game History</h2>

                <div class="table-wrapper">
                    <table class="styled-table" id="historyTable">
                        <thead>
                            <tr>
                                <th>Round</th>
                                <th>Bet</th>
                                <th>Amount</th>
                                <th>Result</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Dynamic -->
                        </tbody>
                    </table>
                </div>
            </div>

        </div>

        <footer>
            © 2024 Pitwarriors619. All rights reserved.
        </footer>

    </div>

    <!-- SNACKBAR -->
    <div id="snackbar"></div>

    <script>
        let currentUser = null;

        // ==========================
        // SESSION CHECK
        // ==========================
        async function checkSession() {
            try {
                const res = await fetch('/api/dashboard', {
                    credentials: 'include'
                });

                if (res.status === 401) {
                    window.location.href = '/';
                    return;
                }

                const data = await res.json();
                currentUser = data;

                document.querySelectorAll('.username')
                    .forEach(el => el.textContent = data.username);

            } catch (err) {
                console.error(err);
                window.location.href = '/';
            }
        }

        // ==========================
        // SIDEBAR
        // ==========================
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('collapsed');
        }

        // ==========================
        // SNACKBAR
        // ==========================
        function showSnackbar(message, type = "") {
            const sb = document.getElementById("snackbar");
            sb.textContent = message;
            sb.className = "show " + type;

            setTimeout(() => {
                sb.className = sb.className.replace("show", "");
            }, 3000);
        }

        // ==========================
        // PLACE BET (FRONTEND ONLY DEMO)
        // ==========================
        function placeBet() {
            const side = document.getElementById('betSide').value;
            const amount = document.getElementById('betAmount').value;

            if (!side || !amount || amount <= 0) {
                return showSnackbar("Invalid bet input", "error");
            }

            // TEMP DEMO (replace with API later)
            const table = document.querySelector("#historyTable tbody");

            const row = `
                <tr>
                    <td>${Date.now()}</td>
                    <td>${side}</td>
                    <td>${amount}</td>
                    <td>-</td>
                    <td>Pending</td>
                </tr>
            `;

            table.insertAdjacentHTML('afterbegin', row);

            showSnackbar("Bet placed successfully");
            
            // reset
            document.getElementById('betSide').value = "";
            document.getElementById('betAmount').value = "";
        }

        // INIT
        checkSession();
    </script>

</body>
</html>
